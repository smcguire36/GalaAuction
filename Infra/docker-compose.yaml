services:
  production-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "8081:18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  keycloak:
    image: "quay.io/keycloak/keycloak:26.5"
    command:
      - "start"
      - "--import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_PASSWORD}"
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES: "opentelemetry"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      VIRTUAL_HOST: "id.galaauction.local"
      VIRTUAL_PORT: "8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "keycloak"
    ports:
      - "6001:8080"
      - "9000"
    volumes:
      - type: "volume"
        target: "/opt/keycloak/data"
        source: "keycloak-galaauction"
        read_only: false
      - type: "bind"
        target: "/opt/keycloak/data/import"
        source: "${KEYCLOAK_BINDMOUNT_0}"
        read_only: true
    networks:
      - "aspire"
  postgres:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "postgres-galaauction"
        read_only: false
    networks:
      - "aspire"
  galaauction-server:
    image: "${GALAAUCTION_SERVER_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${GALAAUCTION_SERVER_PORT};8082"
      KEYCLOAK_HTTP: "http://keycloak:8080"
      services__keycloak__http__0: "http://keycloak:8080"
      KEYCLOAK_MANAGEMENT: "http://keycloak:9000"
      services__keycloak__http__1: "http://keycloak:9000"
      ConnectionStrings__GalaAuctionDb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=GalaAuctionDb"
      GALAAUCTIONDB_HOST: "postgres"
      GALAAUCTIONDB_PORT: "5432"
      GALAAUCTIONDB_USERNAME: "postgres"
      GALAAUCTIONDB_PASSWORD: "${POSTGRES_PASSWORD}"
      GALAAUCTIONDB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/GalaAuctionDb"
      GALAAUCTIONDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/GalaAuctionDb"
      GALAAUCTIONDB_DATABASENAME: "GalaAuctionDb"
      FRONTEND_HTTP: "http://frontend:5173"
      services__frontend__http__0: "http://frontend:5173"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "galaauction-server"
    ports:
      - "${GALAAUCTION_SERVER_PORT}"
      - "7001:8082"
    depends_on:
      keycloak:
        condition: "service_started"
      postgres:
        condition: "service_started"
    networks:
      - "aspire"
  frontend:
    image: "${FRONTEND_IMAGE}"
    environment:
      NODE_ENV: "production"
      VITE_PORT: "5173"
      GALAAUCTION_SERVER_HTTP: "http://galaauction-server:${GALAAUCTION_SERVER_PORT}"
      services__galaauction-server__http__0: "http://galaauction-server:${GALAAUCTION_SERVER_PORT}"
      GALAAUCTION_SERVER_HTTPS: "https://galaauction-server:${GALAAUCTION_SERVER_PORT}"
      GALAAUCTION_SERVER_AUCTIONAPI: "http://galaauction-server:8082"
      services__galaauction-server__http__1: "http://galaauction-server:8082"
      KEYCLOAK_HTTP: "http://keycloak:8080"
      services__keycloak__http__0: "http://keycloak:8080"
      KEYCLOAK_MANAGEMENT: "http://keycloak:9000"
      services__keycloak__http__1: "http://keycloak:9000"
      VITE_KEYCLOAK_URL: "http://keycloak:8080"
      GATEWAY_HTTP: "http://gateway:5000"
      services__gateway__http__0: "http://gateway:5000"
      GATEWAY_GATEWAY_HTTP: "http://gateway:8080"
      services__gateway__http__1: "http://gateway:8080"
      VITE_BACKEND_URL: "http://gateway:8080"
      VITE_GATEWAY_URL: "http://gateway:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "frontend"
    ports:
      - "5173:5173"
    depends_on:
      galaauction-server:
        condition: "service_started"
    networks:
      - "aspire"
  gateway:
    image: "mcr.microsoft.com/dotnet/nightly/yarp:2.3-preview"
    command:
      - "/app/yarp.dll"
    entrypoint:
      - "dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      GALAAUCTION_SERVER_HTTP: "http://galaauction-server:${GALAAUCTION_SERVER_PORT}"
      REVERSEPROXY__ROUTES__route0__MATCH__PATH: "/api/{**catch-all}"
      REVERSEPROXY__ROUTES__route0__ORDER: "1"
      REVERSEPROXY__ROUTES__route0__CLUSTERID: "cluster_galaauction-server"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__PathRemovePrefix: "/api"
      REVERSEPROXY__ROUTES__route1__MATCH__PATH: "{**catch-all}"
      REVERSEPROXY__ROUTES__route1__ORDER: "2"
      REVERSEPROXY__ROUTES__route1__CLUSTERID: "cluster_frontend"
      REVERSEPROXY__CLUSTERS__cluster_galaauction-server__DESTINATIONS__destination1__ADDRESS: "https+http://galaauction-server"
      REVERSEPROXY__CLUSTERS__cluster_frontend__DESTINATIONS__destination1__ADDRESS: "http://frontend"
      services__galaauction-server__http__0: "http://galaauction-server:${GALAAUCTION_SERVER_PORT}"
      GALAAUCTION_SERVER_HTTPS: "https://galaauction-server:${GALAAUCTION_SERVER_PORT}"
      GALAAUCTION_SERVER_AUCTIONAPI: "http://galaauction-server:8082"
      services__galaauction-server__http__1: "http://galaauction-server:8082"
      FRONTEND_HTTP: "http://frontend:5173"
      services__frontend__http__0: "http://frontend:5173"
      ASPNETCORE_URLS: "http://*:8080"
      VIRTUAL_HOST: "api.galaauction.local"
      VIRTUAL_PORT: "8002"
      Logging__LogLevel__Microsoft.ReverseProxy: "Debug"
      Logging__LogLevel__Default: "Debug"
      KEYCLOAK_HTTP: "http://keycloak:8080"
      services__keycloak__http__0: "http://keycloak:8080"
      KEYCLOAK_MANAGEMENT: "http://keycloak:9000"
      services__keycloak__http__1: "http://keycloak:9000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://production-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "gateway"
    ports:
      - "5000"
      - "8001:8080"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  keycloak-galaauction:
    external: true
  postgres-galaauction:
    external: true


